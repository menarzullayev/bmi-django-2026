{% extends 'base.html' %}
{% block title %}Новая запчасть{% endblock %}

{% block content %}
<form method="post" class="max-w-2xl bg-white rounded-lg border border-gray-200 p-6 space-y-4">
  {% csrf_token %}
  <div>
    <h2 class="font-semibold text-lg">Новая запчасть</h2>
    <p class="text-xs text-gray-500">Добавьте позицию на склад.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for field in form %}
    <div class="{% if field.name == 'name' %}md:col-span-2{% endif %}">
      <label class="block text-xs font-medium text-gray-700 mb-1">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
      {{ field }}
      {% if field.errors %}<p class="text-xs text-red-600 mt-1">{{ field.errors|first }}</p>{% endif %}
    </div>
    {% endfor %}
  </div>

  <div class="flex justify-end gap-2 pt-2 border-t border-gray-200">
    <a href="{% url 'parts:list' %}" class="px-4 py-2 rounded-md border border-gray-300 text-sm text-gray-700">Отмена</a>
    <button class="px-5 py-2 rounded-md bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium flex items-center gap-2">
      <i data-lucide="save" class="w-4 h-4"></i> Сохранить
    </button>
  </div>
</form>
{% endblock %}
