<div class="bg-white rounded-lg border border-gray-200 p-5 flex items-center gap-4">
  <div class="w-12 h-12 rounded-lg flex items-center justify-center {{ icon_bg|default:'bg-brand-100 text-brand-600' }}">
    <i data-lucide="{{ icon|default:'activity' }}" class="w-6 h-6"></i>
  </div>
  <div class="min-w-0">
    <div class="text-xs uppercase tracking-wider text-gray-500">{{ label }}</div>
    <div class="text-2xl font-bold text-gray-900">{{ value }}</div>
    {% if hint %}<div class="text-xs text-gray-500 mt-0.5">{{ hint }}</div>{% endif %}
  </div>
</div>
