{% extends 'base.html' %}
{% block title %}Канбан{% endblock %}

{% block content %}
<div class="overflow-x-auto pb-4 scrollbar-thin">
  <div class="flex gap-4 min-w-max">
    {% for col in columns %}
    <div class="w-72 flex-shrink-0 bg-gray-50 rounded-lg border border-gray-200 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
        <h3 class="font-semibold text-sm text-gray-800">{{ col.label }}</h3>
        <span class="text-xs font-medium px-2 py-0.5 rounded bg-white border border-gray-300 text-gray-600">{{ col.count }}</span>
      </div>
      <div class="p-3 space-y-2 min-h-[200px]">
        {% for order in col.orders %}
          {% include 'partials/kanban_card.html' with order=order %}
        {% empty %}
          <p class="text-xs text-gray-400 text-center py-4">— пусто —</p>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
