{% for t in transactions %}
  <div class="py-3 flex items-center justify-between">
    <div>
      <div class="text-sm font-medium">{{ t.reason }}</div>
      <div class="text-xs text-gray-500">{{ t.created_at|date:'d.m.Y H:i' }}</div>
    </div>
    <div class="text-sm font-semibold {% if t.amount >= 0 %}text-emerald-600{% else %}text-rose-600{% endif %}">{{ t.amount|stringformat:'+d' }}</div>
  </div>
{% empty %}
  <p class="text-gray-500 text-sm py-3">Транзакций пока нет.</p>
{% endfor %}
{% if has_more %}
  <div class="pt-4 text-center">
    <button hx-get="{% url 'clients:loyalty_more' %}?offset={{ next_offset }}"
            hx-target="#tx-list" hx-swap="beforeend"
            class="px-4 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-50">Загрузить ещё</button>
  </div>
{% endif %}
