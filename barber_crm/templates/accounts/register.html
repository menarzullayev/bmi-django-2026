{% extends 'base.html' %}
{% block title %}Регистрация — {{ BRAND_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl p-8 border border-gray-100">
  <h1 class="text-2xl font-bold mb-6 text-center">Регистрация</h1>
  {% if error %}<div class="mb-4 px-4 py-2 rounded-lg bg-rose-50 text-rose-700 text-sm">{{ error }}</div>{% endif %}
  <form method="post" class="space-y-3">{% csrf_token %}
    <div>
      <label class="block text-sm font-medium mb-1">Имя</label>
      <input name="first_name" class="w-full border border-gray-200 rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Фамилия</label>
      <input name="last_name" class="w-full border border-gray-200 rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Логин *</label>
      <input name="username" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Телефон *</label>
      <input name="phone" required placeholder="+998901234567" class="w-full border border-gray-200 rounded-lg px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Пароль *</label>
      <input name="password" type="password" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
    </div>
    <button type="submit" class="w-full brand-gradient text-white font-medium rounded-lg py-2.5 mt-2">Создать аккаунт</button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-6">Уже есть аккаунт? <a href="{% url 'accounts:login' %}" class="text-indigo-600 font-medium">Войти</a></p>
</div>
{% endblock %}
