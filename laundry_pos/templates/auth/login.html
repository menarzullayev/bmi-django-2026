{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="card">
    <div class="flex items-center gap-2 mb-6 text-cyan-700">
      <i data-lucide="shirt" class="w-8 h-8"></i>
      <h1 class="text-2xl font-extrabold">Химчистка POS</h1>
    </div>
    <h2 class="text-lg font-bold mb-4">Вход в систему</h2>
    <form method="post">{% csrf_token %}
      {% if form.errors %}
        <div class="rounded-md bg-red-100 text-red-800 px-3 py-2 text-sm mb-3">
          Неверный логин или пароль.
        </div>
      {% endif %}
      <div class="mb-3">
        <label class="block text-sm font-semibold mb-1">Логин</label>
        <input class="input" name="username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-1">Пароль</label>
        <input class="input" type="password" name="password" required>
      </div>
      <button class="btn btn-primary w-full justify-center" type="submit">
        <i data-lucide="log-in" class="w-4 h-4"></i> Войти
      </button>
    </form>
    <div class="mt-4 text-xs text-slate-500">
      Демо: <b>admin</b> / <b>admin123</b> · <b>cashier1</b> / <b>admin123</b>
    </div>
  </div>
</div>
{% endblock %}
